<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約キャンセル | French LABO.</title>
    <link rel="stylesheet" href="style.css"> <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 600px; margin: auto; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; background: #f9f9f9; }
        .btn-cancel { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 20px; }
        .btn-cancel:disabled { background: #ccc; }
        .success-msg { color: #27ae60; font-weight: bold; }
        .error-msg { color: #c0392b; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>
    <h1>ご予約のキャンセル</h1>
    <div id="app" class="card">
        <p id="message" class="loading">情報を照会しています...</p>
        <div id="reservation-details" style="display:none;">
            <p><strong>予約ID:</strong> <span id="res-id"></span></p>
            <p><strong>お名前:</strong> <span id="res-name"></span> 様</p>
            <p><strong>日付:</strong> <span id="res-date"></span></p>
            <p><strong>時間:</strong> <span id="res-slot"></span></p>
            <p><strong>人数:</strong> <span id="res-people"></span> 名</p>
            <hr>
            <p>上記の予約をキャンセルしますか？<br><small>※一度キャンセルすると元に戻せません。</small></p>
            <button id="cancel-btn" class="btn-cancel" onclick="handleCancel()">予約をキャンセルする</button>
        </div>
    </div>

    <script>
        // ★重要: あなたのGAS WebアプリURLに書き換えてください
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/XXXXX/exec";

        const urlParams = new URLSearchParams(window.location.search);
        const reservationId = urlParams.get('id');

        window.onload = async () => {
            if (!reservationId) {
                document.getElementById('message').innerText = "予約IDが見つかりません。メールのリンクから再度お試しください。";
                return;
            }

            try {
                // 予約情報の照会
                const response = await fetch(`${GAS_WEB_APP_URL}?action=query&id=${reservationId}`);
                const result = await response.json();

                if (result.success) {
                    document.getElementById('message').style.display = 'none';
                    document.getElementById('reservation-details').style.display = 'block';
                    document.getElementById('res-id').innerText = result.data[0];
                    document.getElementById('res-name').innerText = result.data[4];
                    document.getElementById('res-date').innerText = new Date(result.data[1]).toLocaleDateString('ja-JP');
                    document.getElementById('res-slot').innerText = result.data[2];
                    document.getElementById('res-people').innerText = result.data[5];
                } else {
                    document.getElementById('message').innerText = "予約が見つからないか、既にキャンセルされています。";
                }
            } catch (error) {
                document.getElementById('message').innerText = "情報の取得に失敗しました。";
            }
        };

        async function handleCancel() {
            if (!confirm("本当にキャンセルしてよろしいですか？")) return;

            const btn = document.getElementById('cancel-btn');
            btn.disabled = true;
            btn.innerText = "処理中...";

            try {
                const response = await fetch(`${GAS_WEB_APP_URL}?action=cancel&id=${reservationId}`);
                const result = await response.json();

                if (result.success) {
                    document.getElementById('app').innerHTML = `<p class="success-msg">キャンセルが完了しました。ご利用ありがとうございました。</p>`;
                } else {
                    alert("キャンセル処理に失敗しました。");
                    btn.disabled = false;
                    btn.innerText = "予約をキャンセルする";
                }
            } catch (error) {
                alert("通信エラーが発生しました。");
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
