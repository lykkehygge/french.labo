<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base target="_top">
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Shippori+Mincho:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --main-color: #111112; --sub-color: #AFB6BB; --accent-color: #CC4900; --white-color: #F0F0F0; --fc-bg-color: var(--white-color); --fc-neutral-bg-color: var(--white-color); --fc-neutral-text-color: var(--main-color); --fc-border-color: var(--sub-color); --fc-button-text-color: var(--white-color); --fc-button-bg-color: var(--main-color); --fc-button-border-color: var(--main-color); --fc-button-hover-bg-color: var(--accent-color); --fc-button-hover-border-color: var(--accent-color); --fc-button-active-bg-color: var(--accent-color); --fc-button-active-border-color: var(--accent-color); --fc-event-bg-color: var(--main-color); --fc-event-border-color: var(--main-color); --fc-event-text-color: var(--white-color); --fc-today-bg-color: transparent; }
    body { font-family: 'Lora', 'Shippori Mincho', "Hiragino Mincho ProN", serif; font-size: 16px; padding: 0; background-color: var(--white-color); color: var(--main-color); margin: 0; line-height: 1.8; -webkit-font-smoothing: antialiased; }
    *, *::before, *::after { box-sizing: border-box; }
    input, button, textarea, select { font-family: inherit; }
    .hero { position: relative; height: 80vh; min-height: 500px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: var(--white-color); overflow: hidden; background: var(--main-color); }
    .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.4; z-index: 1; overflow: hidden; }
    .hero-content { position: relative; z-index: 2; padding: 0 20px; width: 100%; }
    .hero h1 { font-weight: 400; letter-spacing: clamp(4px, 2vw, 8px); font-size: clamp(2.5em, 6vw, 4.5em); margin-bottom: 30px; color: var(--white-color); }
    .concept-text { font-size: clamp(1em, 2.5vw, 1.2em); letter-spacing: 2px; line-height: 2.2; color: var(--white-color); font-weight: 400; }
    section { max-width: 1000px; margin: 140px auto; padding: 0 25px; width: 100%; }
    h2.section-title { font-weight: 500; letter-spacing: 4px; font-size: clamp(1.8em, 4vw, 2.8em); text-align: center; margin-bottom: 70px; position: relative; padding-bottom: 20px; color: var(--main-color); text-transform: uppercase; }
    h2.section-title::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 1px; background: var(--accent-color); }
    #calendar-wrapper { background: var(--white-color); padding: 0; position: relative; }
    #calendar { margin-bottom: 50px; }
    .calendar-header-top { text-align: center; margin-bottom: 25px; }
    #current-month-label { font-size: 1.5em; font-weight: 500; letter-spacing: 2px; color: var(--main-color); }
    .calendar-nav-bottom { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; width: 100%; }
    .cal-btn { background: var(--main-color); color: var(--white-color); border: none; padding: 12px 18px; border-radius: 4px; cursor: pointer; transition: background 0.2s; font-size: 0.9em; min-width: 100px; font-weight: 500; letter-spacing: 1px; }
    .cal-btn:hover { background: var(--accent-color); }
    .cal-btn:disabled { background: var(--sub-color); cursor: not-allowed; }
    .fc-theme-standard th, .fc-theme-standard td { border-color: var(--sub-color) !important; }
    .fc-daygrid-day-frame { min-height: 90px !important; display: flex; flex-direction: column; }
    .available-event { background-color: var(--main-color) !important; color: var(--white-color) !important; }
    .full-event, .holiday-event { background-color: var(--sub-color) !important; color: var(--main-color) !important; pointer-events: none !important; }
    .modal-overlay { background-color: rgba(17, 17, 18, 0.6); backdrop-filter: blur(5px); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; justify-content: center; align-items: center; display: none; }
    .modal-content { background-color: var(--white-color); padding: 40px; border-radius: 4px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    footer { text-align: center; padding: 60px 20px; font-size: 0.85em; border-top: 1px solid var(--sub-color); margin-top: 100px; }
    #loading-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(240, 240, 240, 0.8); z-index: 50; justify-content: center; align-items: center; }
    @media (max-width: 767px) {
      .fc-daygrid-day-frame { min-height: 70px !important; }
      .fc-event-title { font-size: 0.75em !important; white-space: nowrap !important; overflow: hidden !important; }
    }
  </style>
</head>
<body>

  <header class="hero">
    <div class="hero-bg"><div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1533777857889-4be7c70b33f7?auto=format&fit=crop&q=100&w=1600')"></div></div>
    <div class="hero-content"><h1>French LABO.</h1><p class="concept-text">RESERVATION</p></div>
  </header>

  <section id="reservation">
    <h2 class="section-title">RESERVATION</h2>
    <div id="calendar-wrapper">
      <div id="loading-overlay">LOADING...</div>
      <div class="calendar-header-top"><div id="current-month-label"></div></div>
      <div class="calendar-nav-bottom">
        <button class="cal-btn" id="btn-prev-month" onclick="changeMonth(-1)">◀ 前の月</button>
        <button class="cal-btn" onclick="goToToday()">今日</button>
        <button class="cal-btn" id="btn-next-month" onclick="changeMonth(1)">次の月 ▶</button>
      </div>
      <div id="calendar"></div>
    </div>
  </section>

  <footer><p>©ジーピーエム株式会社 All Rights Reserved.</p></footer>

  <div id="res-modal" class="modal-overlay">
    <div class="modal-content">
      <div id="modal-header-text" style="font-size: 1.3em; font-weight:500; text-align:center; margin-bottom:20px; border-bottom:1px solid var(--sub-color); padding-bottom:15px;">予約フォーム</div>
      <div class="form-group"><label>お名前 *</label><input type="text" id="input-name" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid var(--sub-color); border-radius:4px;"></div>
      <div class="form-group"><label>電話番号 *</label><input type="tel" id="input-phone" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid var(--sub-color); border-radius:4px;"></div>
      <div class="form-group"><label>メールアドレス *</label><input type="email" id="input-email" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid var(--sub-color); border-radius:4px;"></div>
      <div class="form-group">
        <label>人数 * (最大<span id="max-people-label">6</span>名)</label>
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px; margin-top:5px;">
          <button type="button" onclick="adjustPeople(-1)" style="width:40px; height:40px;">-</button>
          <input type="number" id="input-people" min="1" max="6" value="1" style="width:50px; text-align:center;" readonly>
          <button type="button" onclick="adjustPeople(1)" style="width:40px; height:40px;">+</button>
        </div>
      </div>
      <div class="form-group"><label>ご利用目的</label><input type="text" id="input-purpose" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid var(--sub-color); border-radius:4px;"></div>
      <div class="form-group"><label>苦手食材</label><input type="text" id="input-dislikes" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid var(--sub-color); border-radius:4px;"></div>
      <div class="form-group"><label>アレルギー</label><input type="text" id="input-allergy" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid var(--sub-color); border-radius:4px;"></div>
      <label style="display:flex; align-items:center; gap:10px; margin-bottom:20px;"><input type="checkbox" id="agree-privacy"> 同意する</label>
      <div style="display:flex; gap:10px;"><button class="cal-btn" style="flex:1; background:var(--sub-color);" onclick="closeModal('res-modal')">戻る</button><button class="cal-btn" style="flex:2;" onclick="submitReservation()">予約確定</button></div>
    </div>
  </div>

  <div id="msg-modal" class="modal-overlay">
    <div class="modal-content" style="text-align:center;"><div id="msg-text" style="margin-bottom:20px;"></div><button class="cal-btn" onclick="closeModal('msg-modal')">OK</button></div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzCTcMUD32sbicdsqsBe6lYCg_6Tsx_waiJAeq5u1WshizEOfiCkNPZ7m0Gaeqbo34iBQ/exec";
    var currentBooking = {}, currentCalendarDate = new Date(), fullCalendarInstance = null;
    function adjustPeople(diff) { var input = document.getElementById('input-people'); var val = parseInt(input.value) + diff; if(val >= 1 && val <= parseInt(input.max)) input.value = val; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    document.addEventListener('DOMContentLoaded', function() { loadCalendarData(currentCalendarDate); });
    function changeMonth(diff) { currentCalendarDate.setMonth(currentCalendarDate.getMonth() + diff); loadCalendarData(currentCalendarDate); }
    function goToToday() { currentCalendarDate = new Date(); loadCalendarData(currentCalendarDate); }

    function loadCalendarData(dateObj) {
      document.getElementById('loading-overlay').style.display = 'flex';
      var yearMonthStr = dateObj.getFullYear() + "-" + ('0' + (dateObj.getMonth() + 1)).slice(-2);
      document.getElementById('current-month-label').innerText = dateObj.getFullYear() + "年 " + (dateObj.getMonth() + 1) + "月";
      fetch(WEB_APP_URL + '?action=getCalendarData&yearMonth=' + yearMonthStr)
        .then(res => res.json()).then(data => renderCalendar(data))
        .catch(() => { alert("通信エラー"); document.getElementById('loading-overlay').style.display = 'none'; });
    }

    function renderCalendar(data) {
      document.getElementById('loading-overlay').style.display = 'none';
      var eventsArray = [];
      var today = new Date(); today.setHours(0,0,0,0);
      var displayMonth = parseInt(data.currentYearMonth.split('-')[1]) - 1;
      var dateInMonth = new Date(parseInt(data.currentYearMonth.split('-')[0]), displayMonth, 1);
      while(dateInMonth.getMonth() === displayMonth) {
        var dateStr = Utilities.formatDate(dateInMonth);
        var holidayStatus = data.holidayMap[dateStr];
        if (holidayStatus === "終日") { eventsArray.push({ title: '休業', start: dateStr, classNames: ['holiday-event'] }); }
        else {
          ['ランチ', 'ディナー'].forEach(slot => {
            if (holidayStatus === slot) { eventsArray.push({ title: slot + ':休', start: dateStr, classNames: ['holiday-event'] }); }
            else {
              var remain = data.maxSeats - (data.bookedCounts[dateStr + '_' + slot] || 0);
              eventsArray.push({ title: (slot === 'ランチ' ? '昼' : '夜') + ':' + (remain > 0 ? '残' + remain : '満'), start: dateStr, classNames: [remain > 0 ? 'available-event' : 'full-event'], extendedProps: { slot, remain } });
            }
          });
        }
        dateInMonth.setDate(dateInMonth.getDate() + 1);
      }
      if (fullCalendarInstance) fullCalendarInstance.destroy();
      fullCalendarInstance = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'dayGridMonth', locale: 'ja', headerToolbar: false, firstDay: 1,
        events: eventsArray,
        eventClick: function(info) {
          if (!info.event.extendedProps.remain || info.event.extendedProps.remain <= 0) return;
          currentBooking = { date: info.event.startStr, slot: info.event.extendedProps.slot, remain: info.event.extendedProps.remain };
          document.getElementById('modal-header-text').innerText = currentBooking.date + " (" + currentBooking.slot + ")";
          document.getElementById('input-people').max = Math.min(currentBooking.remain, 6);
          document.getElementById('res-modal').style.display = 'flex';
        }
      });
      fullCalendarInstance.render();
    }

    function submitReservation() {
      var payload = {
        date: currentBooking.date, slot: currentBooking.slot,
        name: document.getElementById('input-name').value,
        phone: document.getElementById('input-phone').value,
        email: document.getElementById('input-email').value,
        people: document.getElementById('input-people').value,
        purpose: document.getElementById('input-purpose').value,
        dislikes: document.getElementById('input-dislikes').value, // ★独立して送信
        allergy: document.getElementById('input-allergy').value   // ★独立して送信
      };
      if(!payload.name || !payload.phone || !payload.email || !document.getElementById('agree-privacy').checked) { alert("必須項目を確認してください"); return; }
      document.getElementById('loading-overlay').style.display = 'flex';
      fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.json()).then(res => {
          if(res.status === "OK") { document.getElementById('msg-text').innerHTML = "予約完了<br>ID: " + res.reservationId; document.getElementById('msg-modal').style.display = 'flex'; closeModal('res-modal'); loadCalendarData(currentCalendarDate); }
          else { alert("エラー: " + res.message); document.getElementById('loading-overlay').style.display = 'none'; }
        }).catch(() => { alert("通信エラー"); document.getElementById('loading-overlay').style.display = 'none'; });
    }
    const Utilities = { formatDate: (d) => d.getFullYear() + "-" + ('0' + (d.getMonth() + 1)).slice(-2) + "-" + ('0' + d.getDate()).slice(-2) };
  </script>
</body>
</html>
